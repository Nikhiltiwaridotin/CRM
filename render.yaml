services:
  - type: web
    name: internship-project-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run db:migrate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: internship-project-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

  - type: web
    name: internship-project-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: internship-project-backend
          property: host
      - key: NODE_ENV
        value: production

databases:
  - name: internship-project-db
    plan: free
